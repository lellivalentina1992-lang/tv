<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV ULTRA PRO v2026 - LCN Nazionale Completo</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            line-height: 1.6;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        h1 {
            text-align: center;
            color: #4361ee;
            font-size: 2em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Status Area (Cruciale per accessibilità) */
        .status-bar {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #2ecc71;
            border: 2px solid #333;
            font-size: 1.1em;
        }

        /* Intestazione Sezione Canali */
        .section-header {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 6px solid #4361ee;
        }

        .section-header h2 {
            font-size: 1.6em;
            color: #4361ee;
        }

        /* Griglia Telecomando LCN */
        .remote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .channel-btn {
            padding: 20px 10px;
            background: #333;
            border: 2px solid #444;
            color: white;
            border-radius: 15px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-btn .lcn-tag {
            font-size: 0.8em;
            color: #4361ee;
            margin-bottom: 5px;
            background: #1a1a1a;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .channel-btn:hover, .channel-btn:focus {
            background: #4361ee;
            border-color: #fff;
            outline: none;
            transform: translateY(-5px);
        }

        /* Player Video */
        .video-box {
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        video { width: 100%; height: 100%; display: block; }

        /* Controlli */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 15px;
            background: #4361ee;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
        }

        .btn.sec { background: #444; }

        /* Ricerca e Liste */
        .search-area {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px solid #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 1em;
        }

        .results-scroll {
            max-height: 300px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
        }

        .list-item {
            padding: 12px;
            background: #2a2a2a;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: #2ecc71;
            width: 0%;
            border-radius: 5px;
            transition: width 0.3s;
        }

        /* Impostazioni originali */
        .settings-box {
            margin-top: 30px;
            background: #252525;
            padding: 20px;
            border-radius: 15px;
        }

        @media (max-width: 600px) {
            .remote-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TV ULTRA PRO v2026</h1>

    <div class="status-bar" id="status" role="status" aria-live="polite">
        Sistema in avvio... caricamento delle 18 sorgenti.
    </div>

    <section class="section-header">
        <h2>Elenco Canali Nazionali (LCN)</h2>
    </section>

    <nav class="remote-grid" aria-label="Digitale Terrestre">
        <button class="channel-btn" onclick="playSmart('Rai 1')"><span class="lcn-tag">1</span>Rai 1</button>
        <button class="channel-btn" onclick="playSmart('Rai 2')"><span class="lcn-tag">2</span>Rai 2</button>
        <button class="channel-btn" onclick="playSmart('Rai 3')"><span class="lcn-tag">3</span>Rai 3</button>
        <button class="channel-btn" onclick="playSmart('Rete 4')"><span class="lcn-tag">4</span>Rete 4</button>
        <button class="channel-btn" onclick="playSmart('Canale 5')"><span class="lcn-tag">5</span>Canale 5</button>
        <button class="channel-btn" onclick="playSmart('Italia 1')"><span class="lcn-tag">6</span>Italia 1</button>
        <button class="channel-btn" onclick="playSmart('La7')"><span class="lcn-tag">7</span>La7</button>
        <button class="channel-btn" onclick="playSmart('TV8')"><span class="lcn-tag">8</span>TV8</button>
        <button class="channel-btn" onclick="playSmart('Nove')"><span class="lcn-tag">9</span>Nove</button>
        <button class="channel-btn" onclick="playSmart('20 Mediaset')"><span class="lcn-tag">20</span>20</button>
        <button class="channel-btn" onclick="playSmart('Rai 4')"><span class="lcn-tag">21</span>Rai 4</button>
        <button class="channel-btn" onclick="playSmart('Iris')"><span class="lcn-tag">22</span>Iris</button>
        <button class="channel-btn" onclick="playSmart('Rai Movie')"><span class="lcn-tag">24</span>Rai Movie</button>
        <button class="channel-btn" onclick="playSmart('La5')"><span class="lcn-tag">30</span>La5</button>
    </nav>

    <div class="video-box">
        <video id="player" controls aria-label="Visualizzatore TV"></video>
    </div>

    <div class="controls-row">
        <button class="btn" onclick="doFS()">Schermo Intero</button>
        <button class="btn" onclick="vUp()">Volume +</button>
        <button class="btn" onclick="vDown()">Volume -</button>
        <button class="btn sec" onclick="tMute()">Muto (M)</button>
        <button class="btn sec" id="recBtn" onclick="tRec()">Registra</button>
    </div>

    <div class="search-area">
        <div class="progress-container" id="pCont"><div class="progress-bar" id="pBar"></div></div>
        <div class="input-group">
            <input type="text" id="sIn" placeholder="Cerca tra tutte le fonti..." aria-label="Cerca canale">
            <button class="btn" style="min-width: 80px;" onclick="doSearch()">Vai</button>
            <button class="btn sec" onclick="initDB()">Ricarica Liste</button>
        </div>
        <div id="res" class="results-scroll" role="list"></div>
    </div>

    <div class="settings-box">
        <h3>Impostazioni Avanzate</h3>
        <input type="text" id="apiKey" placeholder="ScrapingAnt API Key (Opzionale)" style="width:100%; margin:10px 0;">
        <button class="btn sec" onclick="saveSets()">Salva API Key</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<script>
    // LISTA INTEGRALE DI TUTTE LE 18 SORGENTI ORIGINALI
    const M3U_SOURCES = [
        { name: 'IPTV-Org Italia', url: 'https://iptv-org.github.io/iptv/countries/it.m3u' },
        { name: 'TV Italia Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/italia.m3u' },
        { name: 'Tivu.m3u Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/tivu.m3u' },
        { name: 'Free TV Klauss', url: 'https://raw.githubusercontent.com/killawtho/Free-TV/master/iptv.m3u' },
        { name: 'FreeTVlist', url: 'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_italy.m3u8' },
        { name: 'World IPTV', url: 'https://raw.githubusercontent.com/mitthu786/tvepg/main/Italy.m3u' },
        { name: 'In The Mix', url: 'https://raw.githubusercontent.com/inthemix22/inthemix/main/iptv.m3u' },
        { name: 'Tundrak TV', url: 'https://raw.githubusercontent.com/tundrak/IPTV-Italia/main/iptvitacompiled.m3u' },
        { name: 'FreeIPTV Sammyboi', url: 'https://raw.githubusercontent.com/sammyboi1801/FreeIPTV/main/iptv.m3u' },
        { name: 'TivuStream', url: 'https://raw.githubusercontent.com/Paradise-91/ParaTV/main/streams/it.m3u' },
        { name: 'Lista Personale', url: 'https://raw.githubusercontent.com/notanewbie/LDN/main/italy.m3u' },
        { name: 'Italia Reloaded', url: 'https://pastebin.com/raw/qpbLKZuj' },
        { name: 'Italia Mix', url: 'https://pastebin.com/raw/iZWVJoWy' },
        { name: 'RAI Collection', url: 'https://pastebin.com/raw/9vF0SRsy' },
        { name: 'Mediaset Premium', url: 'https://pastebin.com/raw/3ZDX8Tjt' },
        { name: 'Sport Italia', url: 'https://pastebin.com/raw/HiQXAwUv' },
        { name: 'Regionali Italia', url: 'https://pastebin.com/raw/V5k7u3wU' },
        { name: 'News Italia 24 7', url: 'https://pastebin.com/raw/7wZbMxkL' }
    ];

    let db = [];
    let grouped = {};
    let hls = null;
    let dash = null;
    let rec = null;
    let chunks = [];
    const v = document.getElementById('player');
    const s = document.getElementById('status');

    function msg(t, e = false) { s.textContent = t; s.style.color = e ? "#ff4757" : "#2ecc71"; }

    async function initDB() {
        msg("Caricamento delle 18 liste... attendi.");
        document.getElementById('pCont').style.display = 'block';
        db = [];
        const apiKey = localStorage.getItem('scrapingant_key') || "";

        for (let i = 0; i < M3U_SOURCES.length; i++) {
            try {
                let url = M3U_SOURCES[i].url;
                let finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                
                const res = await fetch(finalUrl);
                const text = await res.text();
                parse(text, M3U_SOURCES[i].name);
                document.getElementById('pBar').style.width = ((i+1)/M3U_SOURCES.length*100) + '%';
            } catch (err) { console.error("Errore " + M3U_SOURCES[i].name); }
        }

        grouped = {};
        db.forEach(c => {
            const k = c.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!grouped[k]) grouped[k] = { name: c.name, links: [] };
            grouped[k].links.push(c);
        });

        document.getElementById('pCont').style.display = 'none';
        msg("Tutte le 18 liste sono caricate. " + db.length + " flussi pronti.");
    }

    function parse(data, src) {
        const lines = data.split('\n');
        let cur = null;
        lines.forEach(l => {
            l = l.trim();
            if (l.startsWith('#EXTINF:')) {
                const m = l.match(/,(.+)$/);
                if (m) cur = { name: m[1].trim(), src: src };
            } else if (l && !l.startsWith('#') && cur) {
                cur.url = l;
                db.push(cur);
                cur = null;
            }
        });
    }

    async function playSmart(name) {
        if (Object.keys(grouped).length === 0) await initDB();
        const k = name.toLowerCase().replace(/[^a-z0-9]/g, '');
        const entry = grouped[k];
        if (!entry) { msg("Canale non trovato.", true); return; }

        msg("Testando le fonti per " + name + "...");
        for (let l of entry.links) {
            try {
                await start(l.url);
                msg("In onda: " + name + " (da " + l.src + ")");
                return;
            } catch (e) { continue; }
        }
        msg("Nessuna fonte funzionante per " + name, true);
    }

    function start(url) {
        return new Promise((resolve, reject) => {
            v.pause(); v.removeAttribute('src'); v.load();
            if (hls) { hls.destroy(); hls = null; }
            if (dash) { dash.reset(); dash = null; }
            const t = setTimeout(() => reject(), 10000);

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { clearTimeout(t); v.play(); resolve(); });
                    hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) reject(); });
                } else {
                    v.src = url; v.onloadeddata = () => { clearTimeout(t); resolve(); };
                }
            } else if (url.includes('.mpd')) {
                dash = dashjs.MediaPlayer().create(); dash.initialize(v, url, true);
                v.onplaying = () => { clearTimeout(t); resolve(); };
            } else {
                v.src = url; v.play().then(() => { clearTimeout(t); resolve(); }).catch(reject);
            }
        });
    }

    function doSearch() {
        const q = document.getElementById('sIn').value.toLowerCase();
        const r = document.getElementById('res');
        r.innerHTML = '';
        Object.values(grouped).filter(c => c.name.toLowerCase().includes(q)).forEach(m => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.textContent = m.name + " (" + m.links.length + " fonti)";
            d.onclick = () => playSmart(m.name);
            r.appendChild(d);
        });
    }

    function vUp() { v.volume = Math.min(1, v.volume + 0.1); }
    function vDown() { v.volume = Math.max(0, v.volume - 0.1); }
    function tMute() { v.muted = !v.muted; }
    function doFS() { if (!document.fullscreenElement) v.requestFullscreen(); else document.exitFullscreen(); }
    function saveSets() { localStorage.setItem('scrapingant_key', document.getElementById('apiKey').value); msg("API Key salvata."); }

    function tRec() {
        const b = document.getElementById('recBtn');
        if (!rec || rec.state === 'inactive') {
            chunks = [];
            const str = v.captureStream ? v.captureStream() : v.mozCaptureStream();
            rec = new MediaRecorder(str, { mimeType: 'video/webm' });
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const bl = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(bl); a.download = 'TV_v2026_REC.webm'; a.click();
            };
            rec.start(); b.textContent = "STOP"; b.style.background = "#e74c3c";
        } else {
            rec.stop(); b.textContent = "Registra"; b.style.background = "#444";
        }
    }

    window.onload = initDB;
</script>
</body>
</html>
