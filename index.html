<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV ULTRA PRO v2026 - Link Diretti</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22TV%20ULTRA%20PRO%22,%22short_name%22:%22TVULTRA%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#4361ee%22}">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #121212;
            color: #ffffff;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        h1 { text-align: center; color: #4361ee; margin-bottom: 20px; text-transform: uppercase; }

        /* Stato Caricamento */
        .status-bar {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #2ecc71;
            border: 2px solid #333;
            min-height: 60px;
        }

        /* Sezione Azione Canale (Dove appare il link) */
        .action-box {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #4361ee;
            display: none; /* Appare quando selezioni un canale */
            text-align: center;
        }

        .channel-title-active { font-size: 1.5em; color: #fff; margin-bottom: 15px; }

        .direct-link-btn {
            display: inline-block;
            background: #2ecc71;
            color: #000;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            width: 100%;
            margin-bottom: 10px;
        }

        .copy-btn {
            background: #444;
            color: white;
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Telecomando */
        .section-header {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 15px;
            border-left: 6px solid #4361ee;
        }

        .remote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .channel-btn {
            padding: 18px 5px;
            background: #333;
            border: 2px solid #444;
            color: white;
            border-radius: 15px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .channel-btn:focus { outline: 3px solid #fff; background: #4361ee; }

        .debug-console {
            margin-top: 30px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85em;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-area { margin-top: 30px; }
        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #2a2a2a; color: white;
        }

        @media (max-width: 600px) {
            .remote-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TV ULTRA PRO v2026</h1>

    <div class="status-bar" id="mainStatus" role="status" aria-live="polite">
        Caricamento database canali...
    </div>

    <div id="actionBox" class="action-box">
        <div id="activeChannelName" class="channel-title-active">Seleziona un canale</div>
        
        <a id="directLink" href="#" target="_blank" class="direct-link-btn" aria-label="Apri canale in modalità diretta">
            ▶ APRI CANALE (DIRETTO)
        </a>
        
        <button class="copy-btn" onclick="copyURL()" aria-label="Copia link negli appunti">
            📋 COPIA LINK PER VLC
        </button>
        
        <p style="margin-top: 15px; font-size: 0.8em; color: #aaa;">
            Nota: Se non parte nel browser, clicca "Copia" e incollalo in VLC.
        </p>
    </div>

    <section class="section-header">
        <h2>Canali Nazionali</h2>
    </section>

    <nav class="remote-grid" aria-label="Telecomando">
        <button class="channel-btn" onclick="selectChannel('Rai 1')" aria-label="1, Rai 1">1, Rai 1</button>
        <button class="channel-btn" onclick="selectChannel('Rai 2')" aria-label="2, Rai 2">2, Rai 2</button>
        <button class="channel-btn" onclick="selectChannel('Rai 3')" aria-label="3, Rai 3">3, Rai 3</button>
        <button class="channel-btn" onclick="selectChannel('Rete 4')" aria-label="4, Rete 4">4, Rete 4</button>
        <button class="channel-btn" onclick="selectChannel('Canale 5')" aria-label="5, Canale 5">5, Canale 5</button>
        <button class="channel-btn" onclick="selectChannel('Italia 1')" aria-label="6, Italia 1">6, Italia 1</button>
        <button class="channel-btn" onclick="selectChannel('La7')" aria-label="7, La 7">7, La 7</button>
        <button class="channel-btn" onclick="selectChannel('TV8')" aria-label="8, TV 8">8, TV 8</button>
        <button class="channel-btn" onclick="selectChannel('Nove')" aria-label="9, Nove">9, Nove</button>
        <button class="channel-btn" onclick="selectChannel('20 Mediaset')" aria-label="20, 20 Mediaset">20, 20</button>
        <button class="channel-btn" onclick="selectChannel('Rai 4')" aria-label="21, Rai 4">21, Rai 4</button>
        <button class="channel-btn" onclick="selectChannel('Iris')" aria-label="22, Iris">22, Iris</button>
        <button class="channel-btn" onclick="selectChannel('Rai Movie')" aria-label="24, Rai Movie">24, Rai Movie</button>
        <button class="channel-btn" onclick="selectChannel('La5')" aria-label="30, La 5">30, La 5</button>
        <button class="channel-btn" onclick="selectChannel('Real Time')" aria-label="31, Real Time">31, Real Time</button>
    </nav>

    <div class="search-area">
        <input type="text" id="sIn" onkeyup="doSearch()" placeholder="Cerca altro canale..." aria-label="Cerca canale">
        <div id="res" style="margin-top: 15px;"></div>
    </div>

    <div class="debug-console" id="debugLog" role="log" aria-live="polite">
        [Sistema] In attesa...
    </div>

    <div style="margin-top: 30px; background: #252525; padding: 15px; border-radius: 12px;">
        <h3>Configurazione API</h3>
        <input type="password" id="apiKey" value="f840651dc26e4d7382c1fd13f18f6e83" style="width:100%; margin:10px 0; padding:12px; background:#111; color:#0f0; border:none;">
        <button class="copy-btn" onclick="saveKey()">Salva Key</button>
    </div>
</div>

<script>
    // Tutte le 18 fonti originali
    const M3U_SOURCES = [
        { name: 'RAI Collection', url: 'https://pastebin.com/raw/9vF0SRsy' },
        { name: 'Mediaset Premium', url: 'https://pastebin.com/raw/3ZDX8Tjt' },
        { name: 'IPTV-Org Italia', url: 'https://iptv-org.github.io/iptv/countries/it.m3u' },
        { name: 'TV Italia Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/italia.m3u' },
        { name: 'Tivu.m3u Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/tivu.m3u' },
        { name: 'Free TV Klauss', url: 'https://raw.githubusercontent.com/killawtho/Free-TV/master/iptv.m3u' },
        { name: 'Tundrak TV', url: 'https://raw.githubusercontent.com/tundrak/IPTV-Italia/main/iptvitacompiled.m3u' },
        { name: 'Regionali Italia', url: 'https://pastebin.com/raw/V5k7u3wU' },
        { name: 'FreeTVlist', url: 'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_italy.m3u8' },
        { name: 'World IPTV', url: 'https://raw.githubusercontent.com/mitthu786/tvepg/main/Italy.m3u' },
        { name: 'In The Mix', url: 'https://raw.githubusercontent.com/inthemix22/inthemix/main/iptv.m3u' },
        { name: 'FreeIPTV Sammyboi', url: 'https://raw.githubusercontent.com/sammyboi1801/FreeIPTV/main/iptv.m3u' },
        { name: 'TivuStream', url: 'https://raw.githubusercontent.com/Paradise-91/ParaTV/main/streams/it.m3u' },
        { name: 'Lista Personale', url: 'https://raw.githubusercontent.com/notanewbie/LDN/main/italy.m3u' },
        { name: 'Italia Reloaded', url: 'https://pastebin.com/raw/qpbLKZuj' },
        { name: 'Italia Mix', url: 'https://pastebin.com/raw/iZWVJoWy' },
        { name: 'Sport Italia', url: 'https://pastebin.com/raw/HiQXAwUv' },
        { name: 'News Italia 24 7', url: 'https://pastebin.com/raw/7wZbMxkL' }
    ];

    let db = [], grouped = {}, lastURL = "";
    const mainStatus = document.getElementById('mainStatus');
    const debugLog = document.getElementById('debugLog');

    function log(m) {
        const d = document.createElement('div');
        d.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
        debugLog.appendChild(d);
        debugLog.scrollTop = debugLog.scrollHeight;
    }

    async function fetchList(url, listName) {
        const key = document.getElementById('apiKey').value;
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        // 1. Prova Diretta (se hai estensione) o Proxy
        for (let p of proxies) {
            try {
                const res = await fetch(p + encodeURIComponent(url));
                if (res.ok) {
                    const text = await res.text();
                    if (text.includes("#EXTINF")) { log(`Caricata: ${listName}`); return text; }
                }
            } catch (e) {}
        }

        // 2. Fallback ScrapingAnt (Essenziale per Pastebin/Mobile)
        if (key) {
            try {
                const saUrl = `https://api.scrapingant.com/v2/general?url=${encodeURIComponent(url)}&x-api-key=${key}&browser=true`;
                const res = await fetch(saUrl);
                if (res.ok) {
                    const json = await res.json();
                    if (json.content) { log(`Caricata via API: ${listName}`); return json.content; }
                }
            } catch (e) {}
        }
        return null;
    }

    async function initDB() {
        mainStatus.textContent = "Sincronizzazione canali...";
        db = [];
        for (let src of M3U_SOURCES) {
            const content = await fetchList(src.url, src.name);
            if (content) {
                const lines = content.split(/\r?\n/);
                let cur = null;
                lines.forEach(l => {
                    l = l.trim();
                    if (l.startsWith('#EXTINF:')) {
                        const commaIndex = l.lastIndexOf(',');
                        if (commaIndex !== -1) cur = { name: l.substring(commaIndex + 1).trim(), src: src.name };
                    } else if (l && !l.startsWith('#') && cur) {
                        cur.url = l; db.push(cur); cur = null;
                    }
                });
                updateGroups();
            }
        }
        mainStatus.textContent = `Database pronto: ${Object.keys(grouped).length} canali.`;
    }

    function updateGroups() {
        grouped = {};
        db.forEach(ch => {
            const k = ch.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!grouped[k]) grouped[k] = { name: ch.name, links: [] };
            grouped[k].links.push(ch);
        });
    }

    function selectChannel(name) {
        const k = name.toLowerCase().replace(/[^a-z0-9]/g, '');
        const entry = grouped[k];
        if (!entry) { alert("Canale non trovato nelle liste caricate."); return; }

        const box = document.getElementById('actionBox');
        const title = document.getElementById('activeChannelName');
        const linkTag = document.getElementById('directLink');

        box.style.display = 'block';
        title.textContent = `Canale: ${entry.name}`;
        
        // Prendiamo la prima fonte disponibile
        lastURL = entry.links[0].url;
        linkTag.href = lastURL;
        
        // Feedback vocale
        mainStatus.textContent = `Link pronto per ${entry.name}. Clicca il tasto verde.`;
        log(`Pronto: ${entry.name}`);
        
        // Scroll automatico all'area di azione per screen reader
        box.scrollIntoView({ behavior: 'smooth' });
    }

    function doSearch() {
        const q = document.getElementById('sIn').value.toLowerCase();
        const res = document.getElementById('res');
        res.innerHTML = '';
        if (q.length < 2) return;
        Object.values(grouped).filter(c => c.name.toLowerCase().includes(q)).forEach(m => {
            const d = document.createElement('div');
            d.style.cssText = "padding:15px; background:#333; margin-top:5px; border-radius:10px; cursor:pointer;";
            d.textContent = m.name;
            d.onclick = () => selectChannel(m.name);
            res.appendChild(d);
        });
    }

    function copyURL() {
        if (!lastURL) return;
        navigator.clipboard.writeText(lastURL);
        mainStatus.textContent = "URL Copiato! Incollalo in VLC.";
        log("URL copiato negli appunti.");
    }

    function saveKey() { localStorage.setItem('scrapingant_key', document.getElementById('apiKey').value); log("Key salvata."); }

    window.onload = () => {
        const saved = localStorage.getItem('scrapingant_key');
        if (saved) document.getElementById('apiKey').value = saved;
        initDB();
    };
</script>
</body>
</html>
