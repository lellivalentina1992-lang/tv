<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV ULTRA PRO v2026 - Debug Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            color: #333;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        /* Avviso Caricamento e Stato */
        .status {
            text-align: center;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.2em;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 10px;
            border: 2px solid #28a745;
        }

        .status.warning {
            color: #856404;
            background-color: #fff3cd;
            border-color: #ffeeba;
        }

        .section-header {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }

        .section-header h2 {
            font-size: 1.4em;
            color: #667eea;
        }

        /* Griglia Telecomando LCN */
        .remote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .channel-btn {
            padding: 15px 10px;
            background: #fff;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 15px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-btn:hover, .channel-btn:focus {
            background: #667eea;
            color: #fff;
            outline: none;
            transform: translateY(-3px);
        }

        .controls {
            display: grid;
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="password"] {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 16px;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .video-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            display: block;
            max-height: 70vh;
        }

        .player-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .player-controls button {
            flex: 1;
            min-width: 120px;
        }

        .recording-timer {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border-radius: 25px;
            font-weight: bold;
        }

        .recording-timer.active { display: flex; }

        .channels-grid {
            display: grid;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .channel-group {
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border-left: 4px solid #667eea;
        }

        /* Console di Debug */
        .debug-section {
            margin-top: 30px;
            padding: 20px;
            background: #212529;
            color: #00ff00;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
        }

        .debug-log {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 10px;
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            color: white;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TV ULTRA PRO v2026</h1>
        <div class="status" id="mainStatus" role="status" aria-live="assertive">Inizializzazione sistema...</div>

        <section class="section-header">
            <h2>Telecomando Rapido</h2>
        </section>

        <nav class="remote-grid">
            <button class="channel-btn" onclick="playLCN('Rai 1')" aria-label="Canale 1, Rai 1">1. Rai 1</button>
            <button class="channel-btn" onclick="playLCN('Rai 2')" aria-label="Canale 2, Rai 2">2. Rai 2</button>
            <button class="channel-btn" onclick="playLCN('Rai 3')" aria-label="Canale 3, Rai 3">3. Rai 3</button>
            <button class="channel-btn" onclick="playLCN('Rete 4')" aria-label="Canale 4, Rete 4">4. Rete 4</button>
            <button class="channel-btn" onclick="playLCN('Canale 5')" aria-label="Canale 5, Canale 5">5. Canale 5</button>
            <button class="channel-btn" onclick="playLCN('Italia 1')" aria-label="Canale 6, Italia 1">6. Italia 1</button>
            <button class="channel-btn" onclick="playLCN('La7')" aria-label="Canale 7, La 7">7. La7</button>
            <button class="channel-btn" onclick="playLCN('TV8')" aria-label="Canale 8, TV 8">8. TV8</button>
            <button class="channel-btn" onclick="playLCN('Nove')" aria-label="Canale 9, Nove">9. Nove</button>
            <button class="channel-btn" onclick="playLCN('20 Mediaset')" aria-label="Canale 20, 20 Mediaset">20. 20</button>
        </nav>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cerca canale..." aria-label="Cerca canale">
                <button onclick="searchChannel()">Cerca</button>
                <button id="loadAllBtn" onclick="loadAllChannels()">Ricarica Tutte le Liste</button>
            </div>
            <div class="progress-bar" id="progressBar" style="display:none;">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>

        <div class="video-container">
            <video id="videoPlayer" controls aria-label="Player video"></video>
        </div>

        <div class="player-controls">
            <button onclick="toggleFullscreen()">Schermo Intero</button>
            <button onclick="changeVolume(0.1)">Vol +</button>
            <button onclick="changeVolume(-0.1)">Vol -</button>
            <button onclick="toggleMute()">Muto (M)</button>
            <button id="recordBtn" onclick="toggleRecording()">Registra</button>
            <div class="recording-timer" id="recordingTimer" aria-live="polite">
                <span>REC</span> <span id="timerDisplay">00:00</span>
            </div>
        </div>

        <div id="channelsList" class="channels-grid" role="list"></div>

        <div class="debug-section">
            <strong>Console di Debug (Log Attività)</strong>
            <div id="debugLog" class="debug-log" role="log" aria-live="polite">
                [Sistema] In attesa di comandi...
            </div>
        </div>

        <div class="settings-section">
            <h3>Impostazioni Avanzate</h3>
            <label for="apiKey">ScrapingAnt API Key</label>
            <input type="text" id="apiKey" placeholder="Inserisci API Key...">
            <button onclick="saveSettings()">Salva</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <script>
        const M3U_LISTS = [
            { name: 'IPTV-Org Italia', url: 'https://iptv-org.github.io/iptv/countries/it.m3u' },
            { name: 'TV Italia Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/italia.m3u' },
            { name: 'Tivu.m3u Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/tivu.m3u' },
            { name: 'Free TV Klauss', url: 'https://raw.githubusercontent.com/killawtho/Free-TV/master/iptv.m3u' },
            { name: 'FreeTVlist', url: 'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_italy.m3u8' },
            { name: 'World IPTV', url: 'https://raw.githubusercontent.com/mitthu786/tvepg/main/Italy.m3u' },
            { name: 'In The Mix', url: 'https://raw.githubusercontent.com/inthemix22/inthemix/main/iptv.m3u' },
            { name: 'Tundrak TV', url: 'https://raw.githubusercontent.com/tundrak/IPTV-Italia/main/iptvitacompiled.m3u' },
            { name: 'FreeIPTV Sammyboi', url: 'https://raw.githubusercontent.com/sammyboi1801/FreeIPTV/main/iptv.m3u' },
            { name: 'TivuStream', url: 'https://raw.githubusercontent.com/Paradise-91/ParaTV/main/streams/it.m3u' },
            { name: 'Lista Personale', url: 'https://raw.githubusercontent.com/notanewbie/LDN/main/italy.m3u' },
            { name: 'Italia Reloaded', url: 'https://pastebin.com/raw/qpbLKZuj' },
            { name: 'Italia Mix', url: 'https://pastebin.com/raw/iZWVJoWy' },
            { name: 'RAI Collection', url: 'https://pastebin.com/raw/9vF0SRsy' },
            { name: 'Mediaset Premium', url: 'https://pastebin.com/raw/3ZDX8Tjt' },
            { name: 'Sport Italia', url: 'https://pastebin.com/raw/HiQXAwUv' },
            { name: 'Regionali Italia', url: 'https://pastebin.com/raw/V5k7u3wU' },
            { name: 'News Italia 24 7', url: 'https://pastebin.com/raw/7wZbMxkL' }
        ];

        let deduplicatedChannels = [];
        let hls = null, dashPlayer = null, mediaRecorder = null, recordedChunks = [];
        const videoPlayer = document.getElementById('videoPlayer');

        function debugLog(msg, isError = false) {
            const log = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'red' : '#00ff00';
            log.innerHTML += `<div><span style="color:gray">[${time}]</span> <span style="color:${color}">${msg}</span></div>`;
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(msg, isWarning = false) {
            const status = document.getElementById('mainStatus');
            status.textContent = msg;
            status.className = isWarning ? 'status warning' : 'status';
        }

        async function fetchWithCORS(url, listName) {
            const apiKey = document.getElementById('apiKey').value.trim();
            debugLog(`Tentativo caricamento: ${listName}...`);

            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];

            if (apiKey) {
                try {
                    const res = await fetch('https://api.scrapingant.com/v2/general', {
                        method: 'POST', headers: {'x-api-key': apiKey, 'Content-Type': 'application/json'},
                        body: JSON.stringify({url: url, browser: false})
                    });
                    if (res.ok) return await res.text();
                } catch (e) { debugLog(`ScrapingAnt fallito per ${listName}`, true); }
            }

            for (let proxy of proxies) {
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), 10000);
                    const res = await fetch(proxy, {signal: controller.signal});
                    clearTimeout(id);
                    if (res.ok) {
                        debugLog(`Successo: ${listName} caricata via proxy.`);
                        return await res.text();
                    }
                } catch (e) { debugLog(`Fallito proxy per ${listName}`, true); }
            }
            throw new Error(`Impossibile caricare ${listName}`);
        }

        function parseM3U(content, sourceName) {
            const channels = [];
            const lines = content.split('\n');
            let current = null;
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) current = { name: nameMatch[1].trim(), source: sourceName };
                } else if (line && !line.startsWith('#') && current) {
                    current.url = line;
                    channels.push(current);
                    current = null;
                }
            }
            return channels;
        }

        async function loadAllChannels() {
            const btn = document.getElementById('loadAllBtn');
            const pBar = document.getElementById('progressBar');
            const pFill = document.getElementById('progressFill');
            
            btn.disabled = true;
            pBar.style.display = 'block';
            let allChannels = [];
            let loadedCount = 0;

            updateStatus("ATTENZIONE: Caricamento 18 liste in corso. Non aggiornare la pagina.", true);

            for (let i = 0; i < M3U_LISTS.length; i++) {
                const list = M3U_LISTS[i];
                try {
                    const content = await fetchWithCORS(list.url, list.name);
                    const channels = parseM3U(content, list.name);
                    allChannels = allChannels.concat(channels);
                    loadedCount++;
                } catch (e) { debugLog(`ERRORE FATALE: ${list.name} saltata.`, true); }

                const percent = Math.round(((i + 1) / M3U_LISTS.length) * 100);
                pFill.style.width = percent + '%';
                pFill.textContent = percent + '%';
            }

            const groups = {};
            allChannels.forEach(ch => {
                const norm = ch.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                if (!groups[norm]) groups[norm] = { name: ch.name, sources: [] };
                groups[norm].sources.push(ch);
            });
            deduplicatedChannels = Object.values(groups);

            updateStatus(`Sistema Pronto. ${deduplicatedChannels.length} canali caricati da ${loadedCount} liste.`);
            debugLog(`Caricamento completato. Totale canali unici: ${deduplicatedChannels.length}`);
            btn.disabled = false;
        }

        async function playLCN(name) {
            if (deduplicatedChannels.length === 0) await loadAllChannels();
            const query = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const index = deduplicatedChannels.findIndex(ch => ch.name.toLowerCase().replace(/[^a-z0-9]/g, '').includes(query));
            if (index !== -1) playWithFallback(index);
        }

        async function playWithFallback(idx) {
            const ch = deduplicatedChannels[idx];
            updateStatus(`Connessione a ${ch.name}...`);
            for (let src of ch.sources) {
                try {
                    debugLog(`Tentativo stream: ${ch.name} via ${src.source}`);
                    await playStream(src.url);
                    updateStatus(`In riproduzione: ${ch.name}`);
                    return;
                } catch (e) { debugLog(`Fonte fallita per ${ch.name}`, true); }
            }
            updateStatus(`Errore: fonti non disponibili per ${ch.name}`, true);
        }

        function playStream(url) {
            return new Promise((resolve, reject) => {
                if (hls) { hls.destroy(); hls = null; }
                if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
                videoPlayer.pause();
                videoPlayer.removeAttribute('src');
                videoPlayer.load();

                const timeout = setTimeout(() => reject(new Error("Timeout")), 12000);

                if (url.includes('.m3u8')) {
                    if (Hls.isSupported()) {
                        hls = new Hls(); hls.loadSource(url); hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => { clearTimeout(timeout); videoPlayer.play(); resolve(); });
                    }
                } else {
                    videoPlayer.src = url;
                    videoPlayer.play().then(() => { clearTimeout(timeout); resolve(); }).catch(reject);
                }
            });
        }

        // Funzioni player base mantenute
        function toggleFullscreen() { if (!document.fullscreenElement) videoPlayer.requestFullscreen(); else document.exitFullscreen(); }
        function changeVolume(d) { videoPlayer.volume = Math.max(0, Math.min(1, videoPlayer.volume + d)); }
        function toggleMute() { videoPlayer.muted = !videoPlayer.muted; }
        function saveSettings() { localStorage.setItem('scrapingant_key', document.getElementById('apiKey').value); debugLog("Impostazioni salvate."); }

        window.onload = loadAllChannels;
    </script>
</body>
</html>
