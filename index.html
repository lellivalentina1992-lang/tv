<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV ULTRA PRO v2026 - Versione Integrale</title>
    <style>
        /* STILE GENERALE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            line-height: 1.6;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        h1 {
            text-align: center;
            color: #4361ee;
            font-size: 2.2em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* BARRA DI STATO E PROGRESSO */
        .status-bar {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #2ecc71;
            border: 2px solid #333;
            font-size: 1.1em;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar.warning { color: #f1c40f; border-color: #f1c40f; }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4361ee, #2ecc71);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* INTESTAZIONI SEZIONI */
        .section-header {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 25px;
            margin-bottom: 15px;
            border-left: 6px solid #4361ee;
        }

        .section-header h2 { font-size: 1.4em; color: #4361ee; }

        /* GRIGLIA PULSANTI TELECOMANDO */
        .remote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .channel-btn {
            padding: 20px 10px;
            background: #333;
            border: 2px solid #444;
            color: white;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .channel-btn:hover, .channel-btn:focus {
            background: #4361ee;
            border-color: #fff;
            outline: 3px solid #fff;
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(67, 97, 238, 0.4);
        }

        /* PLAYER VIDEO */
        .video-box {
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 30px;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
            border: 2px solid #333;
        }

        video { width: 100%; height: 100%; display: block; }

        /* CONTROLLI PLAYER */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 15px;
            background: #4361ee;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .btn:hover { background: #3f37c9; }
        .btn.sec { background: #444; }
        .btn.sec:hover { background: #555; }

        /* REGISTRAZIONE */
        .recording-timer {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.6; } }
        .recording-timer.active { display: flex; }

        /* RICERCA E RISULTATI */
        .search-area {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px solid #333;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }

        input[type="text"], input[type="password"] {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 1em;
        }

        .results-scroll {
            max-height: 350px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .list-item {
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            cursor: pointer;
            border-left: 4px solid #4361ee;
            transition: background 0.2s;
        }

        .list-item:hover { background: #333; }

        /* CONSOLE DEBUG */
        .debug-console {
            margin-top: 30px;
            background: #000;
            color: #0f0;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        /* IMPOSTAZIONI */
        .settings-section {
            margin-top: 30px;
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        @media (max-width: 600px) {
            .remote-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TV ULTRA PRO v2026</h1>

    <div class="status-bar" id="mainStatus" role="status" aria-live="polite">
        Inizializzazione sistema...
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="pBar"></div>
    </div>

    <section class="section-header">
        <h2>Elenco Canali Nazionali</h2>
    </section>

    <nav class="remote-grid" aria-label="Telecomando nazionale">
        <button class="channel-btn" onclick="playLCN('Rai 1')" aria-label="1, Rai 1">1, Rai 1</button>
        <button class="channel-btn" onclick="playLCN('Rai 2')" aria-label="2, Rai 2">2, Rai 2</button>
        <button class="channel-btn" onclick="playLCN('Rai 3')" aria-label="3, Rai 3">3, Rai 3</button>
        <button class="channel-btn" onclick="playLCN('Rete 4')" aria-label="4, Rete 4">4, Rete 4</button>
        <button class="channel-btn" onclick="playLCN('Canale 5')" aria-label="5, Canale 5">5, Canale 5</button>
        <button class="channel-btn" onclick="playLCN('Italia 1')" aria-label="6, Italia 1">6, Italia 1</button>
        <button class="channel-btn" onclick="playLCN('La7')" aria-label="7, La 7">7, La 7</button>
        <button class="channel-btn" onclick="playLCN('TV8')" aria-label="8, TV 8">8, TV 8</button>
        <button class="channel-btn" onclick="playLCN('Nove')" aria-label="9, Nove">9, Nove</button>
        <button class="channel-btn" onclick="playLCN('20 Mediaset')" aria-label="20, 20 Mediaset">20, 20</button>
        <button class="channel-btn" onclick="playLCN('Rai 4')" aria-label="21, Rai 4">21, Rai 4</button>
        <button class="channel-btn" onclick="playLCN('Iris')" aria-label="22, Iris">22, Iris</button>
        <button class="channel-btn" onclick="playLCN('Rai Movie')" aria-label="24, Rai Movie">24, Rai Movie</button>
        <button class="channel-btn" onclick="playLCN('La5')" aria-label="30, La 5">30, La 5</button>
        <button class="channel-btn" onclick="playLCN('Real Time')" aria-label="31, Real Time">31, Real Time</button>
    </nav>

    <section class="section-header">
        <h2>Canali Sportivi</h2>
    </section>

    <nav class="remote-grid" aria-label="Telecomando sport">
        <button class="channel-btn" onclick="playLCN('Rai Sport')" aria-label="57, Rai Sport">57, Rai Sport</button>
        <button class="channel-btn" onclick="playLCN('Sportitalia')" aria-label="60, Sportitalia">60, Sportitalia</button>
        <button class="channel-btn" onclick="playLCN('SuperTennis')" aria-label="64, SuperTennis">64, SuperTennis</button>
        <button class="channel-btn" onclick="playLCN('Eurosport')" aria-label="Eurosport">Eurosport</button>
        <button class="channel-btn" onclick="playLCN('Sky Sport 24')" aria-label="Sky Sport 24">Sky Sport 24</button>
    </nav>

    <div class="video-box">
        <video id="player" controls aria-label="Visualizzatore TV"></video>
    </div>

    <div class="controls-row">
        <button class="btn" onclick="toggleFS()">Schermo Intero</button>
        <button class="btn" onclick="vUp()">Volume +</button>
        <button class="btn" onclick="vDown()">Volume -</button>
        <button class="btn sec" onclick="tMute()">Muto (M)</button>
        <button class="btn sec" id="recBtn" onclick="tRec()">Registra</button>
        <div class="recording-timer" id="recordingTimer" aria-live="polite">
            <span>REC</span> <span id="timerDisplay">00:00</span>
        </div>
    </div>

    <div class="search-area">
        <div class="input-group">
            <input type="text" id="sIn" placeholder="Cerca tra tutti i canali..." aria-label="Inserisci nome canale">
            <button class="btn" style="min-width: 80px;" onclick="doSearch()">Vai</button>
            <button class="btn sec" onclick="initDB()">Ricarica Liste</button>
        </div>
        <div id="res" class="results-scroll" role="list"></div>
    </div>

    <div class="debug-console" id="debugLog" role="log" aria-live="polite">
        [Sistema] Log di attività pronto.
    </div>

    <div class="settings-section">
        <h3>Impostazioni Avanzate</h3>
        <p style="font-size: 0.8em; color: #aaa; margin-bottom: 10px;">ScrapingAnt viene usato automaticamente se i proxy gratuiti falliscono dopo 15 secondi.</p>
        <input type="password" id="apiKey" placeholder="ScrapingAnt API Key" value="f840651dc26e4d7382c1fd13f18f6e83" style="width:100%; margin:10px 0; padding:10px; border-radius:5px; border:none; background:#333; color:white;">
        <div style="display: flex; gap: 10px;">
            <button class="btn sec" onclick="saveSets()">Salva Nuova API</button>
            <button class="btn sec" onclick="loadSets()">Carica Salvata</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<script>
    // LISTA INTEGRALE DELLE 18 SORGENTI ORIGINALI
    const M3U_SOURCES = [
        { name: 'RAI Collection', url: 'https://pastebin.com/raw/9vF0SRsy' },
        { name: 'Mediaset Premium', url: 'https://pastebin.com/raw/3ZDX8Tjt' },
        { name: 'IPTV-Org Italia', url: 'https://iptv-org.github.io/iptv/countries/it.m3u' },
        { name: 'TV Italia Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/italia.m3u' },
        { name: 'Tivu.m3u Fulgione', url: 'https://raw.githubusercontent.com/Fulgione89/iptv/main/tivu.m3u' },
        { name: 'Free TV Klauss', url: 'https://raw.githubusercontent.com/killawtho/Free-TV/master/iptv.m3u' },
        { name: 'Tundrak TV', url: 'https://raw.githubusercontent.com/tundrak/IPTV-Italia/main/iptvitacompiled.m3u' },
        { name: 'Regionali Italia', url: 'https://pastebin.com/raw/V5k7u3wU' },
        { name: 'FreeTVlist', url: 'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_italy.m3u8' },
        { name: 'World IPTV', url: 'https://raw.githubusercontent.com/mitthu786/tvepg/main/Italy.m3u' },
        { name: 'In The Mix', url: 'https://raw.githubusercontent.com/inthemix22/inthemix/main/iptv.m3u' },
        { name: 'FreeIPTV Sammyboi', url: 'https://raw.githubusercontent.com/sammyboi1801/FreeIPTV/main/iptv.m3u' },
        { name: 'TivuStream', url: 'https://raw.githubusercontent.com/Paradise-91/ParaTV/main/streams/it.m3u' },
        { name: 'Lista Personale', url: 'https://raw.githubusercontent.com/notanewbie/LDN/main/italy.m3u' },
        { name: 'Italia Reloaded', url: 'https://pastebin.com/raw/qpbLKZuj' },
        { name: 'Italia Mix', url: 'https://pastebin.com/raw/iZWVJoWy' },
        { name: 'Sport Italia', url: 'https://pastebin.com/raw/HiQXAwUv' },
        { name: 'News Italia 24 7', url: 'https://pastebin.com/raw/7wZbMxkL' }
    ];

    let db = [];
    let grouped = {};
    let hls = null;
    let dash = null;
    let rec = null;
    let chunks = [];
    let recordingInterval = null;
    const video = document.getElementById('player');
    const mainStatus = document.getElementById('mainStatus');
    const debugConsole = document.getElementById('debugLog');
    const pBar = document.getElementById('pBar');

    function log(msg, isError = false) {
        const entry = document.createElement('div');
        entry.style.color = isError ? '#ff4757' : '#0f0';
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugConsole.appendChild(entry);
        debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    function setStatus(msg, isWarning = false) {
        mainStatus.textContent = msg;
        mainStatus.className = isWarning ? 'status-bar warning' : 'status-bar';
    }

    // FUNZIONE FETCH PAZIENTE: PROVA PROXY PER 15S, POI API
    async function fetchWithCORS(url, listName, attempt = 0) {
        const apiKey = document.getElementById('apiKey').value.trim();
        const cacheBuster = (url.includes('?') ? '&' : '?') + 't=' + Date.now();
        const finalUrl = url + cacheBuster;

        // Tentativo DIRETTO (per chi ha estensione Allow CORS attiva)
        if (attempt === 0) {
            try {
                const res = await fetch(finalUrl);
                if (res.ok) {
                    const text = await res.text();
                    if (text.includes("#EXTINF")) return text;
                }
            } catch (e) {}
            return await fetchWithCORS(url, listName, 1);
        }

        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        // 1. Prova i proxy gratuiti (15 secondi di timeout ciascuno)
        if (attempt <= proxies.length) {
            const pUrl = proxies[attempt - 1] + encodeURIComponent(finalUrl);
            log(`Tentativo ${listName} via Proxy ${attempt} (Attesa 15s)...`);
            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 15000); // 15 secondi richiesti
                const res = await fetch(pUrl, { signal: controller.signal });
                clearTimeout(tid);
                if (res.ok) {
                    const text = await res.text();
                    if (text && text.includes("#EXTINF")) {
                        log(`Caricata: ${listName} (Successo Proxy)`);
                        return text;
                    }
                }
            } catch (e) {}
            return await fetchWithCORS(url, listName, attempt + 1);
        }

        // 2. Ultima risorsa: ScrapingAnt
        if (apiKey) {
            log(`Tutti i proxy falliti per ${listName}. Utilizzo ScrapingAnt...`, true);
            try {
                const saUrl = `https://api.scrapingant.com/v2/general?url=${encodeURIComponent(finalUrl)}&x-api-key=${apiKey}`;
                const res = await fetch(saUrl);
                if (res.ok) {
                    const json = await res.json();
                    if (json.content && json.content.includes("#EXTINF")) {
                        log(`Caricata: ${listName} (via ScrapingAnt)`);
                        return json.content;
                    }
                }
            } catch (e) { log(`Errore ScrapingAnt per ${listName}`, true); }
        }
        throw new Error("Fallimento");
    }

    async function initDB() {
        setStatus("Caricamento approfondito liste... Attendere prego.", true);
        db = [];
        let loaded = 0;

        // Caricamento sequenziale per dare tempo ai proxy di rispondere
        for (let i = 0; i < M3U_SOURCES.length; i++) {
            const src = M3U_SOURCES[i];
            try {
                const content = await fetchWithCORS(src.url, src.name);
                if (content) {
                    parseM3U(content, src.name);
                    loaded++;
                    pBar.style.width = Math.round(((i + 1) / M3U_SOURCES.length) * 100) + '%';
                    updateGroups();
                    setStatus(`Caricamento: ${loaded}/${M3U_SOURCES.length} liste pronte.`);
                }
            } catch (e) { log(`Saltata: ${src.name} (Tutti i tentativi falliti)`, true); }
            await new Promise(r => setTimeout(r, 400));
        }
        setStatus(`Database pronto. ${Object.keys(grouped).length} canali trovati.`);
    }

    function parseM3U(data, srcName) {
        if (!data || typeof data !== 'string') return;
        const lines = data.split(/\r?\n/);
        let cur = null;
        lines.forEach(l => {
            l = l.trim();
            if (l.startsWith('#EXTINF:')) {
                const commaIndex = l.lastIndexOf(',');
                if (commaIndex !== -1) {
                    const name = l.substring(commaIndex + 1).trim();
                    if (name) cur = { name: name, src: srcName };
                }
            } else if (l && !l.startsWith('#') && cur) {
                cur.url = l;
                db.push(cur);
                cur = null;
            }
        });
    }

    function updateGroups() {
        grouped = {};
        db.forEach(ch => {
            const k = ch.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!grouped[k]) grouped[k] = { name: ch.name, links: [] };
            grouped[k].links.push(ch);
        });
    }

    async function playLCN(name) {
        const k = name.toLowerCase().replace(/[^a-z0-9]/g, '');
        const entry = grouped[k];
        if (!entry) { setStatus(`Canale ${name} non trovato nelle liste caricate.`, true); return; }

        setStatus(`Connessione a ${name}...`);
        for (let l of entry.links) {
            try {
                log(`Provo fonte: ${l.src}`);
                await startStream(l.url);
                setStatus(`In onda: ${name}`);
                return;
            } catch (e) { log(`Fonte ${l.src} fallita.`, true); }
        }
        setStatus(`Nessuna fonte funzionante per ${name}.`, true);
    }

    function startStream(url) {
        return new Promise((resolve, reject) => {
            video.pause(); video.removeAttribute('src'); video.load();
            if (hls) { hls.destroy(); hls = null; }
            if (dash) { dash.reset(); dash = null; }

            const timeout = setTimeout(() => reject("Timeout"), 15000);

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ manifestLoadingTimeOut: 10000, xhrSetup: xhr => xhr.withCredentials = false });
                    hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { clearTimeout(timeout); video.play().then(resolve).catch(reject); });
                    hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) reject(); });
                } else { video.src = url; video.play().then(resolve).catch(reject); }
            } else if (url.includes('.mpd')) {
                dash = dashjs.MediaPlayer().create(); dash.initialize(video, url, true);
                video.onplaying = () => { clearTimeout(timeout); resolve(); };
            } else {
                video.src = url; video.play().then(resolve).catch(reject);
            }
        });
    }

    function doSearch() {
        const q = document.getElementById('sIn').value.toLowerCase();
        const res = document.getElementById('res');
        res.innerHTML = '';
        Object.values(grouped).filter(ch => ch.name.toLowerCase().includes(q)).forEach(m => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.textContent = m.name;
            d.onclick = () => playLCN(m.name);
            res.appendChild(d);
        });
    }

    function vUp() { video.volume = Math.min(1, video.volume + 0.1); }
    function vDown() { video.volume = Math.max(0, video.volume - 0.1); }
    function tMute() { video.muted = !video.muted; }
    function toggleFS() { if (!document.fullscreenElement) video.requestFullscreen(); else document.exitFullscreen(); }
    
    function saveSets() { localStorage.setItem('scrapingant_key', document.getElementById('apiKey').value); log("API Key salvata."); }
    function loadSets() { const k = localStorage.getItem('scrapingant_key'); if (k) document.getElementById('apiKey').value = k; }

    function tRec() {
        const btn = document.getElementById('recBtn'), timer = document.getElementById('recordingTimer');
        if (!rec || rec.state === 'inactive') {
            chunks = [];
            const str = video.captureStream ? video.captureStream() : video.mozCaptureStream();
            rec = new MediaRecorder(str, { mimeType: 'video/webm' });
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const bl = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(bl);
                a.download = `TV_REC_${Date.now()}.webm`; a.click();
            };
            rec.start(); btn.textContent = "STOP"; timer.classList.add('active');
            let sec = 0;
            recordingInterval = setInterval(() => {
                sec++;
                const m = Math.floor(sec/60).toString().padStart(2,'0'), s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timerDisplay').textContent = `${m}:${s}`;
            }, 1000);
        } else { rec.stop(); btn.textContent = "Registra"; timer.classList.remove('active'); clearInterval(recordingInterval); }
    }

    window.onload = function() { loadSets(); initDB(); };
</script>
</body>
</html>
